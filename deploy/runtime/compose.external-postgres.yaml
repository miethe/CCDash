# Override for external-Postgres deployments under podman-compose 1.5.0.
#
# WORKAROUND CONTEXT
# ------------------
# Compose v2 lets a service declare an optional dependency via:
#     depends_on:
#       postgres:
#         condition: service_healthy
#         required: false
#
# `docker compose` honors `required: false` and silently drops the edge
# when the `postgres` service is not part of the active profile set.
# `podman-compose` 1.5.0 does NOT honor `required: false`: it tries to
# resolve the postgres dependency unconditionally and aborts with
# `KeyError: 'postgres'` whenever an operator brings up the
# `enterprise` profile against an externally-managed Postgres
# (CCDASH_DATABASE_URL pointing off-stack).
#
# WHAT THIS OVERRIDE DOES
# -----------------------
# It uses the Compose v2 `!reset` tag to drop `depends_on` from `api`
# and `worker` entirely. Both `docker compose` and `podman-compose`
# implement `!reset` as "remove this key from the merged result", so
# postgres is no longer referenced as a dependency in the rendered
# graph and `podman-compose ... up` succeeds.
#
# TRADEOFF
# --------
# Stripping `depends_on` also removes the soft `worker -> api` start
# ordering. That edge in `compose.yaml` is best-effort startup
# ordering only; the worker's own startup-sync retries against the
# API endpoint, so cold-start ordering converges without the compose
# edge. We accept this tradeoff because podman-compose 1.5.0's
# `!override` parser cannot represent a nested-mapping replacement
# (it crashes on `api: {condition: service_healthy}`), so a precise
# "drop only postgres, keep api" rewrite is not portable today.
#
# USAGE (podman-compose, external Postgres)
# -----------------------------------------
#   podman-compose --env-file deploy/runtime/.env \
#     -f deploy/runtime/compose.yaml \
#     -f deploy/runtime/compose.external-postgres.yaml \
#     --profile enterprise up
#
# Do NOT layer this override when running with the bundled `postgres`
# profile -- it intentionally removes the dependency edge.

name: ccdash

services:
  api:
    depends_on: !reset []

  worker:
    depends_on: !reset []
