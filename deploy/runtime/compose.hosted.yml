services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${CCDASH_POSTGRES_DB:-ccdash}
      POSTGRES_USER: ${CCDASH_POSTGRES_USER:-ccdash}
      POSTGRES_PASSWORD: ${CCDASH_POSTGRES_PASSWORD:-ccdash}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CCDASH_POSTGRES_USER:-ccdash} -d ${CCDASH_POSTGRES_DB:-ccdash}"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - ccdash-postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ../..
      dockerfile: deploy/runtime/api/Dockerfile
    environment:
      CCDASH_STORAGE_PROFILE: ${CCDASH_STORAGE_PROFILE:-enterprise}
      CCDASH_DB_BACKEND: ${CCDASH_DB_BACKEND:-postgres}
      CCDASH_DATABASE_URL: postgresql://${CCDASH_POSTGRES_USER:-ccdash}:${CCDASH_POSTGRES_PASSWORD:-ccdash}@postgres:5432/${CCDASH_POSTGRES_DB:-ccdash}
      CCDASH_API_BEARER_TOKEN: ${CCDASH_API_BEARER_TOKEN:-ccdash-dev-token}
      CCDASH_FRONTEND_ORIGIN: ${CCDASH_FRONTEND_ORIGIN:-http://localhost:3000}
      CCDASH_PROJECT_ROOT: ${CCDASH_PROJECT_ROOT:-/app}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/ready', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "${CCDASH_API_PORT:-8000}:8000"

  worker:
    build:
      context: ../..
      dockerfile: deploy/runtime/worker/Dockerfile
    environment:
      CCDASH_STORAGE_PROFILE: ${CCDASH_STORAGE_PROFILE:-enterprise}
      CCDASH_DB_BACKEND: ${CCDASH_DB_BACKEND:-postgres}
      CCDASH_DATABASE_URL: postgresql://${CCDASH_POSTGRES_USER:-ccdash}:${CCDASH_POSTGRES_PASSWORD:-ccdash}@postgres:5432/${CCDASH_POSTGRES_DB:-ccdash}
      CCDASH_WORKER_PROJECT_ID: ${CCDASH_WORKER_PROJECT_ID:-smoke-stack}
      CCDASH_PROJECT_ROOT: ${CCDASH_PROJECT_ROOT:-/app}
      CCDASH_WORKER_PROBE_HOST: ${CCDASH_WORKER_PROBE_HOST:-0.0.0.0}
      CCDASH_WORKER_PROBE_PORT: ${CCDASH_WORKER_PROBE_PORT:-9465}
      CCDASH_TELEMETRY_EXPORT_ENABLED: ${CCDASH_TELEMETRY_EXPORT_ENABLED:-true}
      CCDASH_SAM_ENDPOINT: ${CCDASH_SAM_ENDPOINT:-https://telemetry.invalid.example/api/v1/analytics/execution-outcomes}
      CCDASH_SAM_API_KEY: ${CCDASH_SAM_API_KEY:-smoke-api-key}
      CCDASH_TELEMETRY_ALLOW_INSECURE: ${CCDASH_TELEMETRY_ALLOW_INSECURE:-false}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9465/readyz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "${CCDASH_WORKER_PROBE_PORT:-9465}:9465"

  frontend:
    build:
      context: ../..
      dockerfile: deploy/runtime/frontend/Dockerfile
      args:
        VITE_CCDASH_API_BASE_URL: ${VITE_CCDASH_API_BASE_URL:-/api}
    environment:
      CCDASH_FRONTEND_PORT: ${CCDASH_FRONTEND_PORT:-3000}
      CCDASH_API_UPSTREAM: ${CCDASH_API_UPSTREAM:-http://api:8000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${CCDASH_FRONTEND_PORT:-3000}:3000"

volumes:
  ccdash-postgres-data:
