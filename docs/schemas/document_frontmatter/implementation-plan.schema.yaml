$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "ccdash://schemas/document-frontmatter/implementation-plan"
title: "CCDash Implementation Plan Frontmatter"
allOf:
  - $ref: "./base-envelope.schema.yaml"
  - type: object
    required:
      - doc_type
      - feature_slug
    properties:
      doc_type:
        const: implementation_plan
      doc_subtype:
        type: string
        enum: [implementation_plan, rollout_plan, migration_plan]
      objective:
        type: string
      scope:
        type: object
        properties:
          in_scope:
            type: array
            items: { type: string }
          out_of_scope:
            type: array
            items: { type: string }
      architecture_summary:
        type: string
      rollout_strategy:
        type: string
      rollback_strategy:
        type: string
      observability_plan:
        type: string
      testing_strategy:
        type: array
        items:
          type: string
      security_considerations:
        type: array
        items:
          type: string
      data_considerations:
        type: array
        items:
          type: string
      phases:
        type: array
        items:
          $ref: "#/$defs/phase"
      dependencies:
        type: array
        items:
          type: string
      risks:
        type: array
        items:
          type: object
          properties:
            description: { type: string }
            mitigation: { type: string }
      execution_entrypoints:
        type: array
        items:
          type: object
          required: [label, command]
          properties:
            label: { type: string }
            command: { type: string }
            when: { type: string }
            source: { type: string }
$defs:
  phase:
    type: object
    required: [id, title]
    properties:
      id: { type: string }
      title: { type: string }
      status: { type: string }
      goal: { type: string }
      entry_criteria:
        type: array
        items: { type: string }
      exit_criteria:
        type: array
        items: { type: string }
      deliverables:
        type: array
        items: { type: string }
      owners:
        type: array
        items: { type: string }

