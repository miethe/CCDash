<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CCDash · Planning Deck</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    /* Surface + neutrals — cool, low-chroma slate */
    --bg-0: oklch(17% 0.012 260);     /* app background */
    --bg-1: oklch(20% 0.012 260);     /* panel */
    --bg-2: oklch(23% 0.014 260);     /* elevated */
    --bg-3: oklch(27% 0.016 260);     /* hover / tile */
    --bg-4: oklch(32% 0.018 260);     /* divider accents */
    --line-1: oklch(30% 0.014 260);   /* borders */
    --line-2: oklch(38% 0.018 260);   /* prominent borders */
    --ink-0: oklch(96% 0.008 260);    /* primary text */
    --ink-1: oklch(82% 0.010 260);    /* secondary */
    --ink-2: oklch(66% 0.012 260);    /* muted */
    --ink-3: oklch(52% 0.014 260);    /* dim */
    --ink-4: oklch(40% 0.014 260);    /* very dim */

    /* Artifact identity — all chroma 0.14, lightness 70% */
    --spec: oklch(72% 0.12 220);      /* teal-cyan */
    --spk:  oklch(74% 0.15 40);       /* sunset orange */
    --prd:  oklch(72% 0.13 155);      /* green */
    --plan: oklch(72% 0.13 65);       /* amber */
    --prog: oklch(70% 0.14 310);      /* violet */
    --ctx:  oklch(72% 0.12 0);        /* rose */
    --trk:  oklch(72% 0.10 95);       /* olive */
    --rep:  oklch(72% 0.10 260);      /* steel */

    /* Semantic */
    --ok:    oklch(76% 0.15 150);
    --warn:  oklch(78% 0.14 75);
    --err:   oklch(68% 0.18 22);
    --info:  oklch(72% 0.13 240);
    --mag:   oklch(70% 0.16 330);

    /* Model identity — by model family */
    --m-opus:   oklch(72% 0.14 295);
    --m-sonnet: oklch(74% 0.13 195);
    --m-haiku:  oklch(76% 0.13 135);

    /* Primary accent (brand for this surface) */
    --brand: oklch(75% 0.14 195);

    --radius: 10px;
    --radius-sm: 6px;
    --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
    --sans: 'Geist', -apple-system, system-ui, sans-serif;
    --serif: 'Fraunces', Georgia, serif;
  }

  * { box-sizing: border-box; }
  html, body, #root { height: 100%; }
  body {
    margin: 0;
    background: var(--bg-0);
    color: var(--ink-0);
    font-family: var(--sans);
    font-size: 13px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "ss02", "cv11";
  }

  /* Scrollbar — subtle */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line-1); border-radius: 10px; border: 2px solid var(--bg-0); }
  ::-webkit-scrollbar-thumb:hover { background: var(--line-2); }

  /* Base primitives */
  .mono { font-family: var(--mono); font-feature-settings: "zero" 1, "ss02" 1; }
  .serif { font-family: var(--serif); font-variation-settings: "opsz" 48; }
  .tnum { font-variant-numeric: tabular-nums; }
  .caps { text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }

  .panel { background: var(--bg-1); border: 1px solid var(--line-1); border-radius: var(--radius); }
  .tile { background: var(--bg-2); border: 1px solid var(--line-1); border-radius: var(--radius-sm); }
  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 2px 8px; border-radius: 999px; font-size: 11px; line-height: 1.5; border: 1px solid var(--line-1); background: var(--bg-2); color: var(--ink-1); white-space: nowrap; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500; border: 1px solid var(--line-1); background: var(--bg-2); color: var(--ink-0); cursor: pointer; transition: border-color .12s, background .12s, color .12s; font-family: inherit; }
  .btn:hover { border-color: var(--line-2); background: var(--bg-3); }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--ink-2); }
  .btn-ghost:hover { color: var(--ink-0); background: var(--bg-2); }
  .btn-primary { background: color-mix(in oklab, var(--brand) 18%, var(--bg-2)); border-color: color-mix(in oklab, var(--brand) 45%, var(--line-1)); color: color-mix(in oklab, var(--brand) 90%, white); }
  .btn-primary:hover { background: color-mix(in oklab, var(--brand) 26%, var(--bg-2)); }

  .dot { width: 6px; height: 6px; border-radius: 999px; display: inline-block; }

  /* Status pill helpers */
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 2px 6px; border-radius: 4px; font-family: var(--mono); font-size: 10.5px; font-weight: 500; line-height: 1.3; letter-spacing: 0.02em; }

  /* Focus ring */
  button:focus-visible, [role="button"]:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid color-mix(in oklab, var(--brand) 60%, transparent);
    outline-offset: 2px;
  }

  /* Subtle noise / plate texture on body to give depth */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image: radial-gradient(circle at 20% -10%, color-mix(in oklab, var(--brand) 8%, transparent), transparent 50%),
                      radial-gradient(circle at 110% 100%, color-mix(in oklab, var(--prog) 6%, transparent), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  #root { position: relative; z-index: 1; }

  /* Graph canvas SVG gets rounded caps */
  svg { display: block; }

  /* Animations */
  @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 color-mix(in oklab, var(--brand) 50%, transparent); } 70% { box-shadow: 0 0 0 8px transparent; } 100% { box-shadow: 0 0 0 0 transparent; } }
  .pulse { animation: pulse-ring 1.8s infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 1.2s linear infinite; }

  @keyframes dash { to { stroke-dashoffset: -24; } }
  .flow { stroke-dasharray: 4 6; animation: dash 1.4s linear infinite; }

  /* Exec button reveal */
  .spike-row:hover .spike-exec { opacity: 1 !important; }
  .batch-col:hover .exec-btn { opacity: 1; }

  /* App density modes */
  .density-comfortable { --row-h: 44px; --gap: 16px; }
  .density-compact { --row-h: 34px; --gap: 10px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="app/data.jsx"></script>
<script type="text/babel" src="app/primitives.jsx"></script>
<script type="text/babel" src="app/graph.jsx"></script>
<script type="text/babel" src="app/feature_detail.jsx"></script>
<script type="text/babel" src="app/triage.jsx"></script>
<script type="text/babel" src="app/tweaks.jsx"></script>
<script type="text/babel" src="app/app.jsx"></script>

<script type="text/babel" data-presets="react">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
