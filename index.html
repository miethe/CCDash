<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CCDash - Agentic Analytics</title>
    <script>
      (function () {
        var storageKey = 'ccdash:theme-mode:v1';
        var root = document.documentElement;
        var preference = 'system';

        try {
          var storedPreference = window.localStorage.getItem(storageKey);
          if (storedPreference === 'dark' || storedPreference === 'light' || storedPreference === 'system') {
            preference = storedPreference;
          }
        } catch (error) {
          preference = 'system';
        }

        var prefersDark =
          typeof window.matchMedia === 'function' &&
          window.matchMedia('(prefers-color-scheme: dark)').matches;
        var resolvedTheme = preference === 'system' ? (prefersDark ? 'dark' : 'light') : preference;

        if (resolvedTheme === 'dark') {
          root.classList.add('dark');
        } else {
          root.classList.remove('dark');
        }

        root.dataset.theme = resolvedTheme;
        root.dataset.themePreference = preference;
        root.style.colorScheme = resolvedTheme;
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,400;1,9..144,300&display=swap" />
    <link rel="stylesheet" href="/src/index.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
